upstream api {
    server api:8080;
}

upstream frontend {
    server frontend:3000;
}

# Redirecionar HTTP para HTTPS
server {
    listen 80;
    server_name chat.eduardomaines.com api.chat.eduardomaines.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chat.eduardomaines.com;

    ssl_certificate     /etc/letsencrypt/live/chat.eduardomaines.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.eduardomaines.com/privkey.pem;

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 443 ssl;
    server_name api.chat.eduardomaines.com;

    ssl_certificate     /etc/letsencrypt/live/api.chat.eduardomaines.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.chat.eduardomaines.com/privkey.pem;

    # SignalR requer WebSocket
    location /messageHub {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
