<div class="chat-wrapper">

  <div class="chat-header">
    <span class="chat-header__hash">#</span>
    <span class="chat-header__name">{{ currentRoomName }}</span>
  </div>

  <div class="messages-container" #messagesContainer>
    <div class="messages-inner">
      <ul class="messages">
        <li class="message" *ngFor="let message of Allmessages" [ngClass]="{
            'message--sent':     message.userName === currentUserName,
            'message--received': message.userName !== currentUserName
          }">

          <img *ngIf="message.userName !== currentUserName"
            [src]="message.profilePictureUrl ?? 'assets/userPlaceholder.png'" class="msg-avatar"
            alt="foto de {{message.userName}}" />

          <div class="msg-content">
            <span class="msg-author">{{ message.userName }}</span>
            <div class="msg-bubble">{{ message.content }}</div>
            <span class="msg-time">{{ message.sentAt | date:'dd/MM/yy HH:mm' }}</span>
          </div>

          <img *ngIf="message.userName === currentUserName"
            [src]="message.profilePictureUrl ?? 'assets/userPlaceholder.png'" class="msg-avatar"
            alt="foto de {{message.userName}}" />

        </li>
      </ul>
    </div>
  </div>

</div>
