<div class="chat-bar">
  <form class="chat-form" ngDefaultControl="form">
    <input
      id="message"
      type="text"
      class="chat-input"
      [formControl]="message"
      name="message"
      placeholder="Escreva uma mensagem..."
      (keydown.enter)="sendMessage($event)"
    />
    <button class="send-btn" (click)="sendMessage($event)" type="button" title="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </form>
</div>
